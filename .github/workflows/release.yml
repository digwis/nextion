name: release

on:
  push:
    branches: [main]
    paths:
      - "packages/nextion/**"
      - "packages/create-nextion-app/**"
      - ".changeset/**"
      - ".github/workflows/release.yml"

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Publish packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build nextion
        run: pnpm --filter @notionx/core build
      - name: Build create-nextion-app
        run: pnpm --filter @notionx/create-nextion-app build

      # Manual version + publish (replaces `changesets/action@v1`,
      # which can't deal with this monorepo: the version step tries
      # to import the built `dist/index.js` of each workspace package
      # in order to read its current changelog, and `@notionx/core`'s
      # dist pulls in `next/server` — a subpath that the `next`
      # package's exports map exposes only as `next/server.js`, so
      # Node ESM refuses to resolve it and the action exits 1 before
      # doing any bumping).
      #
      # We do the same thing in three explicit steps so each failure
      # mode is easy to read in the CI log:
      #
      #   1. `pnpm changeset version` consumes `.changeset/*.md`,
      #      updates `package.json` versions in place, and (because
      #      `.changeset/config.json` sets `changelog: false`) does
      #      NOT try to write CHANGELOG.md — so no package import.
      #   2. `pnpm -r publish` reads the freshly bumped versions
      #      straight from `package.json` and ships them.
      #   3. We commit the version bump + a `RELEASED.md` note back
      #      to main so the next push can diff against the new
      #      baseline.
      - name: Consume changesets and bump versions
        run: pnpm changeset version

      # The registry token has lived under different names on this
      # repo in the past (`NPM_TOKEN`, `NPM_AUTH_TOKEN`, …). Surface
      # which candidates the run actually sees, then write whichever
      # one is populated into `.npmrc` so the next step's
      # `pnpm publish` can authenticate regardless of which name
      # the maintainers chose in GitHub settings.
      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          echo "NPM_TOKEN set:         $([ -n "$NPM_TOKEN" ] && echo yes || echo no)"
          echo "NPM_AUTH_TOKEN set:    $([ -n "$NPM_AUTH_TOKEN" ] && echo yes || echo no)"
          echo "NODE_AUTH_TOKEN set:   $([ -n "$NODE_AUTH_TOKEN" ] && echo yes || echo no)"

          TOKEN="${NPM_TOKEN:-${NPM_AUTH_TOKEN:-${NODE_AUTH_TOKEN:-}}}"
          if [ -z "$TOKEN" ]; then
            echo "::error::No npm registry token found in secrets NPM_TOKEN / NPM_AUTH_TOKEN / NODE_AUTH_TOKEN. Add one in the repo's Settings → Secrets and variables → Actions."
            exit 1
          fi

          # Write the auth token to the project root .npmrc so
          # `pnpm publish` picks it up (it auto-loads .npmrc from
          # the project directory and from $HOME — both paths are
          # written below for belt-and-braces).
          for rc in "$HOME/.npmrc" ".npmrc"; do
            printf '//registry.npmjs.org/:_authToken=%s\n' "$TOKEN" > "$rc"
          done
          echo "Auth configured (token length: ${#TOKEN}) in ~/.npmrc and ./.npmrc."

      - name: Publish packages
        run: pnpm -r publish --no-git-checks --tag latest

      - name: Commit + push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): version packages"
            git push origin HEAD:main
          else
            echo "No version bump to commit — nothing to push."
          fi
